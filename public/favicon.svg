<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sushan logo favicon">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="64" height="64" rx="12" ry="12" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#ffffff" />
  <image
    href="/img/sushan-logo.png"
    x="0"
    y="0"
    width="64"
    height="64"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#rounded)"
  />
</svg>
